  --bg:#1c1012;--sidebar-bg:#150c0e;--item-bg:#2a1a1e;--item-hover:#3a2428;
  --item-sel:#4a2e34;--accent:#ef4444;--accent-h:#f87171;--accent-p:#dc2626;
  --text1:#fde2e2;--text2:#cc8888;--text3:#8a5555;--border:#3a2020;
  --grid:#2a1518;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text1);
  display:flex;height:100vh;overflow:hidden;user-select:none;}

/* ─── Theme ─── */
.sb-theme-row{margin-top:8px;}
.sb-theme-btn{background:var(--item-bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;
  color:var(--text2);font-size:10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.sb-theme-btn:hover{background:var(--item-hover);color:var(--text1);}
#theme-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--sidebar-bg);
  border:1px solid var(--border);border-radius:14px;padding:20px;z-index:100;min-width:320px;
  box-shadow:0 16px 48px rgba(0,0,0,.6);display:none;}
#theme-panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none;}
.tp-title{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:14px;}
.tp-section{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.tp-themes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.tp-theme{width:100%;aspect-ratio:1;border-radius:10px;border:2px solid transparent;cursor:pointer;
  position:relative;overflow:hidden;transition:border-color .15s;}
.tp-theme:hover{border-color:var(--text3);}
.tp-theme.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
.tp-theme-inner{width:100%;height:100%;display:flex;flex-direction:column;}
.tp-theme-top{flex:1;}
.tp-theme-bot{height:35%;display:flex;}
.tp-theme-bot span{flex:1;}
.tp-theme-label{font-size:8px;color:var(--text2);text-align:center;margin-top:4px;}
.tp-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);
  cursor:pointer;font-size:18px;line-height:1;padding:4px;}
.tp-close:hover{color:var(--text1);}

/* ─── Sidebar ─── */
#sidebar{width:240px;min-width:240px;background:var(--sidebar-bg);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:10;}
.sb-header{text-align:center;padding:16px 12px 0;}
.sb-title{font-size:18px;font-weight:800;color:var(--text1);}
.sb-sub{font-size:9px;color:var(--text3);margin-top:2px;}
.sb-sep{height:1px;background:var(--border);margin:12px;}
.sb-section-hdr{display:flex;align-items:center;padding:0 12px;margin-bottom:8px;}
.sb-section-hdr span{font-size:11px;font-weight:600;color:var(--text2);flex:1;}
.sb-add{width:28px;height:28px;border:none;border-radius:14px;background:var(--accent);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sb-add:hover{background:var(--accent-h);}
#board-list{flex:1;overflow-y:auto;padding:0 12px;min-height:80px;}
.board-item{background:var(--item-bg);color:var(--text1);border-radius:8px;padding:12px 14px;
  margin:2px 0;font-size:13px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.board-item:hover{background:var(--item-hover);}
.board-item.active{background:var(--item-sel);border-left:3px solid var(--accent);}
.sb-el-hdr{display:flex;align-items:center;gap:8px;padding:12px;
  background:var(--item-bg);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.sb-el-hdr span{font-size:10px;font-weight:700;color:var(--text1);}
#element-list{flex:1;overflow-y:auto;min-height:60px;}
.el-item{color:var(--text1);padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;
  font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px;}
.el-item:hover{background:var(--item-hover);}
.el-item.active{background:var(--item-sel);border-left:3px solid var(--accent);}
.el-name-input{background:var(--item-bg);border:1px solid var(--accent);border-radius:4px;color:var(--text1);
  font-size:11px;padding:2px 6px;outline:none;width:100%;font-family:inherit;}
.el-icon{width:16px;height:16px;stroke:var(--text1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sb-footer{font-size:8px;color:var(--text3);text-align:center;padding:8px;line-height:1.4;}
.sb-file-actions{display:flex;gap:6px;justify-content:center;padding:0 4px;}
.sb-save-path-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 10px;
  color:#fff;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;flex:1;transition:background .15s;}
.sb-save-path-btn:hover{background:var(--accent-h);color:#fff;}
.sb-save-path-btn svg{stroke:#fff !important;}
.sb-save-path-btn:nth-child(2){background:var(--item-bg);border:1px solid var(--border);color:var(--text1);}
.sb-save-path-btn:nth-child(2) svg{stroke:var(--text1) !important;}
.sb-save-path-btn:nth-child(2):hover{background:var(--item-hover);}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ─── Canvas Area ─── */
#canvas-area{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#canvas-area canvas{display:block;}
#empty-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text3);pointer-events:none;}

/* ─── Toolbar ─── */
#toolbar{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;
  align-items:center;gap:6px;z-index:20;}
#toolbar-panel{background:rgba(20,20,20,0.94);border:1px solid var(--border);border-radius:12px;
  padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;width:52px;}
.tb-btn{width:40px;height:40px;border:none;border-radius:8px;background:transparent;color:var(--text1);
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.tb-btn:hover{background:var(--item-hover);}
.tb-btn:active{background:var(--item-sel);}
.tb-btn svg{width:22px;height:22px;stroke:var(--text1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tb-sep{width:30px;height:1px;background:var(--border);margin:2px 0;}
#zoom-label{font-size:8px;color:var(--text2);cursor:pointer;height:20px;display:flex;align-items:center;justify-content:center;}
#zoom-label:hover{color:var(--text1);}
#fab{width:44px;height:44px;border:none;border-radius:22px;background:var(--accent);color:#fff;
  font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#fab:hover{background:var(--accent-h);}
#fab svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}

/* ─── Draw Panel ─── */
#draw-panel{position:absolute;bottom:16px;right:76px;background:rgba(20,20,20,0.94);border:1px solid var(--border);
  border-radius:12px;padding:12px;z-index:20;display:none;width:180px;}
#draw-panel label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px;}
#draw-panel .dp-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
#draw-panel .dp-row:last-child{margin-bottom:0;}
#draw-size-slider{flex:1;accent-color:var(--accent);height:4px;}
#draw-size-val{font-size:11px;color:var(--text1);min-width:28px;text-align:right;}
.dp-colors{display:flex;flex-wrap:wrap;gap:6px;}
.dp-color{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s;}
.dp-color:hover{border-color:var(--text2);}
.dp-color.active{border-color:var(--accent);}

/* Arrow panel — same pattern as draw panel */
#arrow-panel{position:absolute;bottom:16px;right:76px;background:rgba(20,20,20,0.94);border:1px solid var(--border);
  border-radius:12px;padding:12px;z-index:20;display:none;width:180px;}
#arrow-panel label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px;}
#arrow-panel .dp-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
#arrow-size-slider{flex:1;accent-color:var(--accent);height:4px;}
#arrow-size-val{font-size:11px;color:var(--text1);min-width:28px;text-align:right;}

/* Text panel */
#text-panel{position:absolute;bottom:16px;right:76px;background:rgba(20,20,20,0.94);border:1px solid var(--border);
  border-radius:12px;padding:12px;z-index:20;display:none;width:240px;}
#text-panel label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px;}
#text-panel .dp-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
#text-font{width:100%;padding:5px 8px;background:var(--item-bg);border:1px solid var(--border);border-radius:6px;
  color:var(--text1);font-size:12px;font-family:inherit;outline:none;margin-bottom:10px;cursor:pointer;}
#text-font:focus{border-color:var(--accent);}
#text-size-slider{flex:1;accent-color:var(--accent);height:4px;}
#text-size-val{font-size:11px;color:var(--text1);min-width:28px;text-align:right;}
.tp-format-row{display:flex;gap:4px;margin-bottom:10px;}
.tp-fmt-btn{width:30px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--item-bg);
  color:var(--text1);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Georgia',serif;transition:background .15s,border-color .15s;}
.tp-fmt-btn:hover{background:var(--item-hover);}
.tp-fmt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.tb-btn.tool-active{background:var(--accent) !important;color:#fff;}
.tb-btn.tool-active svg{stroke:#fff;}
.tb-btn-group{position:relative;width:40px;height:40px;}
.tb-btn-group .tb-btn{width:100%;height:100%;}
.tb-dropdown-arrow{position:absolute;bottom:3px;right:3px;width:0;height:0;border-left:3px solid transparent;
  border-right:3px solid transparent;border-top:4px solid var(--text2);pointer-events:none;}
.tb-btn.tool-active+.tb-dropdown-arrow{border-top-color:#fff;}
#arrow-dropdown{position:absolute;right:48px;background:var(--sidebar-bg);border:1px solid var(--border);
  border-radius:8px;padding:4px;z-index:25;display:none;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
#arrow-dropdown .ctx-item{display:flex;align-items:center;gap:8px;}
#arrow-dropdown .ctx-item svg{width:18px;height:18px;stroke:var(--text1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
#arrow-dropdown .ctx-item.selected{background:var(--item-sel);}
#zoom-dropdown{position:absolute;right:48px;background:var(--sidebar-bg);border:1px solid var(--border);
  border-radius:8px;padding:4px;z-index:25;display:none;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
#zoom-dropdown .ctx-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text1);}
#zoom-dropdown .ctx-item:hover{background:var(--item-hover);}
#zoom-dropdown .ctx-item svg{width:16px;height:16px;stroke:var(--text1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* ─── Context Menu ─── */
#ctx-menu{position:fixed;background:var(--sidebar-bg);border:1px solid var(--border);border-radius:8px;
  padding:4px;z-index:100;display:none;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.ctx-item{padding:8px 16px;border-radius:4px;cursor:pointer;font-size:13px;white-space:nowrap;position:relative;}
.ctx-item:hover{background:var(--item-hover);}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}
.ctx-item.has-sub::after{content:'\25B6';position:absolute;right:10px;font-size:8px;opacity:.6;}
.ctx-sub{display:none;position:absolute;left:100%;top:0;background:var(--sidebar-bg);border:1px solid var(--border);
  border-radius:8px;padding:4px;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-height:300px;overflow-y:auto;}
.ctx-item.has-sub:hover>.ctx-sub{display:block;}
.ctx-color-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.ctx-icon{width:14px;height:14px;stroke:var(--text1);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  display:inline-block;vertical-align:middle;margin-right:8px;flex-shrink:0;}
.ctx-item{display:flex;align-items:center;}

/* ─── Modal ─── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;
  justify-content:center;z-index:200;}
#modal{background:var(--sidebar-bg);border:1px solid var(--border);border-radius:12px;padding:24px;
  min-width:320px;max-width:90vw;}
#modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
#modal-body{margin-bottom:20px;}
#modal-body input{width:100%;padding:10px 12px;background:var(--item-bg);border:1px solid var(--border);
  border-radius:6px;color:var(--text1);font-size:14px;font-family:inherit;outline:none;}
#modal-body input:focus{border-color:var(--accent);}
#modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;
  font-family:inherit;background:var(--item-bg);color:var(--text1);}
.modal-btn:hover{background:var(--item-hover);}
.modal-btn.primary{background:var(--accent);color:#fff;}
.modal-btn.primary:hover{background:var(--accent-h);}

/* ─── Tutorial ─── */
.tut-overlay{position:fixed;inset:0;z-index:300;pointer-events:all;transition:opacity .25s;}
.tut-spotlight{position:fixed;z-index:301;border-radius:10px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.72);pointer-events:none;transition:all .35s ease;}
.tut-tooltip{position:fixed;z-index:302;background:var(--sidebar-bg);border:1px solid var(--accent);
  border-radius:12px;padding:18px 20px;max-width:310px;min-width:220px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);color:var(--text1);font-family:'Inter',sans-serif;
  transition:all .35s ease;animation:tutFadeIn .3s ease;}
@keyframes tutFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tut-tooltip-title{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--accent);}
.tut-tooltip-desc{font-size:12px;line-height:1.5;color:var(--text2);margin-bottom:14px;}
.tut-tooltip-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.tut-tooltip-steps{font-size:11px;color:var(--text3);}
.tut-tooltip-btns{display:flex;gap:6px;}
.tut-btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:background .15s;}
.tut-btn-skip{background:transparent;color:var(--text3);}
.tut-btn-skip:hover{color:var(--text1);}
.tut-btn-prev{background:var(--item-bg);color:var(--text1);}
.tut-btn-prev:hover{background:var(--item-hover);}
.tut-btn-next{background:var(--accent);color:#fff;}
.tut-btn-next:hover{background:var(--accent-h);}
.tut-help-btn{position:fixed;bottom:12px;left:12px;z-index:15;width:28px;height:28px;
  border-radius:50%;background:var(--item-bg);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:.5;transition:opacity .2s,background .2s;}
.tut-help-btn:hover{opacity:1;background:var(--accent);border-color:var(--accent);}
.tut-help-btn svg{width:14px;height:14px;stroke:var(--text1);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
const uuid = () => crypto.randomUUID ? crypto.randomUUID() :
  'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});

// SVG icons for context menus
const CTX_ICONS = {
  trash:  '<svg class="ctx-icon" viewBox="0 0 16 16"><polyline points="3,4 4,14 12,14 13,4"/><line x1="2" y1="4" x2="14" y2="4"/><path d="M6 4V3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1"/></svg>',
  front:  '<svg class="ctx-icon" viewBox="0 0 16 16"><rect x="5" y="2" width="8" height="8" rx="1"/><rect x="3" y="6" width="8" height="8" rx="1"/></svg>',
  back:   '<svg class="ctx-icon" viewBox="0 0 16 16"><rect x="3" y="6" width="8" height="8" rx="1"/><rect x="5" y="2" width="8" height="8" rx="1"/></svg>',
  reset:  '<svg class="ctx-icon" viewBox="0 0 16 16"><path d="M4 8a4 4 0 1 1 1 3"/><polyline points="2,7 4,10 7,8"/></svg>',
  edit:   '<svg class="ctx-icon" viewBox="0 0 16 16"><path d="M11 2.5l2.5 2.5L5.5 13H3v-2.5L11 2.5z"/></svg>',
  font:   '<svg class="ctx-icon" viewBox="0 0 16 16"><line x1="4" y1="5" x2="12" y2="5"/><line x1="8" y1="5" x2="8" y2="13"/></svg>',
  palette:'<svg class="ctx-icon" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><circle cx="6" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="10" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="6" cy="10" r="1" fill="currentColor" stroke="none"/></svg>',
  rename: '<svg class="ctx-icon" viewBox="0 0 16 16"><path d="M11 2.5l2.5 2.5L5.5 13H3v-2.5L11 2.5z"/></svg>',
};

const COLORS_TEXT = [
  {name:'Blanco',hex:'#e0e0e0'},{name:'Rojo',hex:'#e05555'},{name:'Naranja',hex:'#e09050'},
  {name:'Amarillo',hex:'#e0d050'},{name:'Verde',hex:'#50c070'},{name:'Azul',hex:'#5080e0'},
  {name:'Violeta',hex:'#8060e0'},{name:'Rosa',hex:'#e060a0'}
];
const FONT_SIZES = [10,12,14,16,20,24,28,32,40,48,64,80];

// ═══════════════════════════════════════════════════════════════
//  DATABASE (IndexedDB)
// ═══════════════════════════════════════════════════════════════
class DB {
  constructor(){this.db=null;}
  open(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open('plagas_board_db',1);
      r.onupgradeneeded=e=>{e.target.result.createObjectStore('boards',{keyPath:'id'});};
      r.onsuccess=e=>{this.db=e.target.result;res();};
      r.onerror=e=>rej(e);
    });
  }
  getAll(){return this._tx('readonly',s=>s.getAll());}
  get(id){return this._tx('readonly',s=>s.get(id));}
  put(d){return this._tx('readwrite',s=>s.put(d));}
  del(id){return this._tx('readwrite',s=>s.delete(id));}
  _tx(mode,fn){
    return new Promise((res,rej)=>{
      const tx=this.db.transaction('boards',mode);
      const r=fn(tx.objectStore('boards'));
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>rej(r.error);
    });
  }
}

// ═══════════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════════
class App {
  constructor(){
    this.db = new DB();
    this.canvas = null;
    this.boards = {};       // id -> {id, name, items, createdAt}
    this.currentBoardId = null;
    this.toolbarExpanded = false;
    this._panning = false;
    this._panStart = {x:0,y:0};
    this._autoSaveTimer = null;
    this._activeTool = 'move'; // 'move' | 'draw' | 'arrow'
    this._drawColor = '#e0e0e0';
    this._drawSize = 3;
    this._arrowType = 'straight'; // 'straight' | 'curved'
    this._arrowSize = 2;
    this._arrowStart = null;
    this._arrowPreview = null;
    this._spaceHeld = false;
    this._eraserSize = 20;
    this._selecting = false;
    this._selectStart = null;
    this._selectRect = null;
    this._fileHandle = null;
    this._undoStack = [];
    this._redoStack = [];
    this._undoLocked = false;
  }

  async init(){
    await this.db.open();
    this.initCanvas();
    this.setupCanvasEvents();
    this.setupShortcuts();
    this.setupDragDrop();
    this.setupPaste();
    this.setupResize();
    this.restoreTheme();
    await this.loadAllBoards();
    this.startAutoSave();
    window.addEventListener('beforeunload', ()=> this.saveCurrentBoard());
    // Restore saved filename label
    const savedName = localStorage.getItem('pb_fileName');
    if(savedName) this._updateSaveFileLabel(savedName);
    this._checkFirstVisitTutorial();
  }

  // ─── Canvas Init ───
  initCanvas(){
    const area = document.getElementById('canvas-area');
    const c = document.getElementById('c');
    c.width = area.clientWidth;
    c.height = area.clientHeight;

    this.canvas = new fabric.Canvas('c',{
      selection: true,
      uniformScaling: true,
      preserveObjectStacking: true,
      stopContextMenu: true,
      fireRightClick: true,
      fireMiddleClick: true,
    });

    // Selection styles & hover cursors
    fabric.Object.prototype.set({
      borderColor:'#6c63ff', cornerColor:'#6c63ff', cornerStrokeColor:'#ffffff',
      cornerStyle:'circle', cornerSize:10, transparentCorners:false,
      borderScaleFactor:2, padding:4, borderDashArray:[4,4],
      hoverCursor:'move',
    });
    this.canvas.moveCursor = 'move';

    // Grid drawing
    this.canvas.on('after:render', ()=> this.drawGrid());
  }

  drawGrid(){
    const ctx = this.canvas.contextContainer;
    const vpt = this.canvas.viewportTransform;
    const zoom = this.canvas.getZoom();
    if(zoom < 0.08) return; // skip grid when very zoomed out

    let spacing = 30;
    if(zoom < 0.25) spacing = 90;

    ctx.save();
    ctx.globalCompositeOperation = 'destination-over';
    ctx.transform(vpt[0],vpt[1],vpt[2],vpt[3],vpt[4],vpt[5]);

    const inv = fabric.util.invertTransform(vpt);
    const tl = fabric.util.transformPoint(new fabric.Point(0,0), inv);
    const br = fabric.util.transformPoint(new fabric.Point(this.canvas.width, this.canvas.height), inv);

    const sx = Math.floor(tl.x/spacing)*spacing;
    const sy = Math.floor(tl.y/spacing)*spacing;

    const styles = getComputedStyle(document.documentElement);
    const gridColor = styles.getPropertyValue('--grid').trim();
    const bgColor = styles.getPropertyValue('--bg').trim();

    ctx.fillStyle = gridColor;
    for(let x=sx; x<=br.x; x+=spacing){
      for(let y=sy; y<=br.y; y+=spacing){
        ctx.beginPath();
        ctx.arc(x,y,1.5,0,Math.PI*2);
        ctx.fill();
      }
    }
    // Background behind grid
    ctx.fillStyle = bgColor;
    ctx.fillRect(tl.x-200, tl.y-200, br.x-tl.x+400, br.y-tl.y+400);
    ctx.restore();
  }

  // ─── Canvas Events ───
  setupCanvasEvents(){
    const c = this.canvas;

    // Pan (middle button or left on empty)
    c.on('mouse:down', opt=>{
      const e = opt.e;
      // Right click → context menu
      if(e.button===2){
        e.preventDefault();
        const target = c.findTarget(e);
        if(target) c.setActiveObject(target);
        this.showContextMenu(e.clientX, e.clientY, target);
        return;
      }
      // Space+click → pan (any tool, like Photoshop)
      if(e.button===0 && this._spaceHeld){
        this._panning = true;
        this._panStart = {x:e.clientX, y:e.clientY};
        c.selection = false;
        c.defaultCursor = 'grabbing';
        c.setCursor('grabbing');
        return;
      }
      // Select tool: if clicking on an already-selected object, auto-switch to move
      if(e.button===0 && this._activeTool === 'select'){
        const target = c.findTarget(e);
        const activeObj = c.getActiveObject();
        if(target && activeObj && (activeObj === target ||
          (activeObj.type === 'activeSelection' && activeObj.contains(target)))){
          // Auto-switch to move tool to allow dragging
          this.setTool('move');
          // Re-trigger Fabric.js mouse handling on the target
          c.__onMouseDown(e);
          return;
        }
        this._selecting = true;
        this._selectStart = c.getPointer(e);
        this._removeSelectRect();
        c.discardActiveObject();
        c.requestRenderAll();
        return;
      }
      // Eraser tool: start erasing pencil strokes
      if(e.button===0 && this._activeTool === 'eraser'){
        this._erasing = true;
        this._erasePencilAt(opt.e);
        return;
      }
      // Arrow tool: click to place points
      if(e.button===0 && this._activeTool === 'arrow'){
        const pointer = c.getPointer(e);
        if(!this._arrowStart){
          this._arrowStart = {x:pointer.x, y:pointer.y};
        } else {
          this.createArrow(this._arrowStart.x, this._arrowStart.y, pointer.x, pointer.y, this._arrowType);
          if(this._arrowPreview){ c.remove(this._arrowPreview); this._arrowPreview=null; }
          this._arrowStart = null;
        }
        return;
      }
      // Middle button or left on empty → pan
      if(e.button===1 || (e.button===0 && !opt.target && this._activeTool === 'move')){
        this._panning = true;
        this._panStart = {x:e.clientX, y:e.clientY};
        c.selection = false;
        c.defaultCursor = 'grabbing';
        c.setCursor('grabbing');
      }
    });

    c.on('mouse:move', opt=>{
      if(this._panning){
        const e = opt.e;
        const vpt = c.viewportTransform;
        vpt[4] += e.clientX - this._panStart.x;
        vpt[5] += e.clientY - this._panStart.y;
        this._panStart = {x:e.clientX, y:e.clientY};
        c.requestRenderAll();
      }
      // Eraser tool: erase pencil strokes while dragging
      if(this._erasing && this._activeTool === 'eraser'){
        this._erasePencilAt(opt.e);
      }
      // Select tool: show move cursor when hovering selected objects
      if(!this._selecting && !this._panning && this._activeTool === 'select'){
        const target = c.findTarget(opt.e);
        const activeObj = c.getActiveObject();
        if(target && activeObj && (activeObj === target ||
          (activeObj.type === 'activeSelection' && activeObj.contains(target)))){
          c.setCursor('move');
        } else {
          c.setCursor('crosshair');
        }
      }
      // Select drag — draw dashed rectangle
      if(this._selecting && this._activeTool === 'select' && this._selectStart){
        const pointer = c.getPointer(opt.e);
        this._updateSelectRect(this._selectStart, pointer);
      }
      // Arrow preview
      if(this._activeTool === 'arrow' && this._arrowStart){
        const pointer = c.getPointer(opt.e);
        this._createArrowPreview(this._arrowStart.x, this._arrowStart.y, pointer.x, pointer.y);
      }
    });

    c.on('mouse:up', ()=>{
      // Finish eraser
      if(this._erasing){
        this._erasing = false;
      }
      // Finish selection rectangle
      if(this._selecting && this._activeTool === 'select'){
        this._selecting = false;
        this._finishSelectRect();
      }
      if(this._panning){
        this._panning = false;
        if(this._activeTool === 'move'){
          c.selection = true;
          c.defaultCursor = 'default';
          c.setCursor('default');
        } else if(this._activeTool === 'arrow' || this._activeTool === 'eraser' || this._activeTool === 'select'){
          c.defaultCursor = 'crosshair';
          c.setCursor('crosshair');
        }
      }
    });

    // Double-click to edit text (like Photoshop/Figma)
    c.on('mouse:dblclick', opt=>{
      const target = c.findTarget(opt.e);
      if(target && target.type === 'i-text'){
        if(this._activeTool !== 'move') this.setTool('move');
        c.setActiveObject(target);
        target.enterEditing();
        target.selectAll();
        c.requestRenderAll();
      }
    });

    // Text panel on selection
    c.on('selection:created', opt=>{ this._onSelectionChange(opt); });
    c.on('selection:updated', opt=>{ this._onSelectionChange(opt); });
    c.on('selection:cleared', ()=>{ this._hideTextPanel(); });

    // Zoom (scroll wheel)
    c.on('mouse:wheel', opt=>{
      const e = opt.e;
      e.preventDefault();
      e.stopPropagation();

      // If scrolling on selected text → resize font
      const target = c.getActiveObject();
      if(target && target.type === 'i-text' && target === c.findTarget(e)){
        let fs = target.fontSize;
        fs += (e.deltaY < 0 ? 2 : -2);
        fs = Math.max(8, Math.min(120, fs));
        target.set('fontSize', fs);
        c.requestRenderAll();
        this.updateElementList();
        return;
      }

      // Zoom canvas
      const factor = 1.15;
      let zoom = c.getZoom();
      zoom = e.deltaY < 0 ? zoom * factor : zoom / factor;
      zoom = Math.max(0.02, Math.min(5, zoom));
      c.zoomToPoint({x:e.offsetX, y:e.offsetY}, zoom);
      this.updateZoomLabel();
    });

    // Text scale → font size conversion
    c.on('object:modified', opt=>{
      const obj = opt.target;
      if(obj && obj.type === 'i-text' && (obj.scaleX!==1 || obj.scaleY!==1)){
        const newSize = Math.round(obj.fontSize * Math.max(obj.scaleX, obj.scaleY));
        obj.set({fontSize: Math.max(8,Math.min(120,newSize)), scaleX:1, scaleY:1});
        c.requestRenderAll();
      }
      this.updateElementList();
    });

    // Text exit editing → remove if empty
    c.on('text:editing:exited', opt=>{
      const obj = opt.target;
      if(obj && !obj.text.trim()){
        c.remove(obj);
      }
      this.updateElementList();
    });

    c.on('path:created', opt=>{
      if(opt.path){
        opt.path.itemId = uuid();
        opt.path.set({selectable:false, evented:false, hoverCursor:'default'});
      }
    });

    c.on('object:added', opt=>{ if(opt.target?._isSelectRect) return; this.updateElementList(); this._saveUndoState(); });
    c.on('object:removed', opt=>{ if(opt.target?._isSelectRect) return; this.updateElementList(); this._saveUndoState(); });
    c.on('object:modified', ()=>{ this._saveUndoState(); });

    c.on('selection:created', opt=> this.highlightElement(opt.selected?.[0]));
    c.on('selection:updated', opt=> this.highlightElement(opt.selected?.[0]));
    c.on('selection:cleared', ()=> this.highlightElement(null));
  }

  // ─── Keyboard Shortcuts ───
  setupShortcuts(){
    document.addEventListener('keydown', e=>{
      // Check if typing in a modal input
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const editing = this.isTextEditing();
      const ctrl = e.ctrlKey || e.metaKey;

      if(!editing && !ctrl){
        if(e.key==='v'||e.key==='V'){e.preventDefault(); this.setTool('move'); return;}
        if(e.key==='m'||e.key==='M'){e.preventDefault(); this.setTool('select'); return;}
        if(e.key==='t'||e.key==='T'){e.preventDefault(); this.addText(); return;}
        if(e.key==='i'||e.key==='I'){e.preventDefault(); this.addImage(); return;}
        if(e.key==='e'||e.key==='E'){e.preventDefault(); this.promptExport(); return;}
        if(e.key==='d'||e.key==='D'){e.preventDefault(); this.setTool('draw'); return;}
        if(e.key==='a'||e.key==='A'){e.preventDefault(); this.setTool('arrow'); return;}
        if(e.key==='x'||e.key==='X'){e.preventDefault(); this.setTool('eraser'); return;}
        if(e.key==='f'||e.key==='F'){e.preventDefault(); this.fitAll(); return;}
        if(e.key==='Delete'||e.key==='Backspace'){this.deleteSelected(); return;}
        if(e.key==='Escape'){e.preventDefault(); this._cancelArrow(); this.setTool('move'); return;}
      }
      if(ctrl && (e.key==='z'||e.key==='Z') && !e.shiftKey){e.preventDefault(); this.undo(); return;}
      if(ctrl && ((e.key==='y'||e.key==='Y') || (e.shiftKey && (e.key==='z'||e.key==='Z')))){e.preventDefault(); this.redo(); return;}
      if(ctrl && e.key==='='){e.preventDefault(); this.zoomIn(); return;}
      if(ctrl && e.key==='-'){e.preventDefault(); this.zoomOut(); return;}
      if(ctrl && e.key==='0'){e.preventDefault(); this.zoomReset(); return;}
      if(ctrl && (e.key==='s'||e.key==='S')){e.preventDefault(); this.saveCurrentBoard(); return;}
      if(ctrl && (e.key==='n'||e.key==='N')){e.preventDefault(); this.promptNewBoard(); return;}
      // Space held → grab cursor for pan
      if(e.key===' ' && !editing){
        e.preventDefault();
        if(!this._spaceHeld){
          this._spaceHeld = true;
          this.canvas.defaultCursor = 'grab';
          this.canvas.setCursor('grab');
          if(this._activeTool === 'draw' || this._activeTool === 'eraser') this.canvas.isDrawingMode = false;
        }
      }
    });
    document.addEventListener('keyup', e=>{
      if(e.key===' ' && this._spaceHeld){
        this._spaceHeld = false;
        if(this._activeTool === 'move'){
          this.canvas.defaultCursor = 'default';
          this.canvas.setCursor('default');
        } else if(this._activeTool === 'draw' || this._activeTool === 'eraser'){
          this.canvas.isDrawingMode = true;
          this.canvas.defaultCursor = 'crosshair';
        } else if(this._activeTool === 'arrow' || this._activeTool === 'select'){
          this.canvas.defaultCursor = 'crosshair';
          this.canvas.setCursor('crosshair');
        }
      }
    });
  }

  isTextEditing(){
    const a = this.canvas.getActiveObject();
    return a && a.type === 'i-text' && a.isEditing;
  }

  // ─── Drag & Drop ───
  setupDragDrop(){
    const area = document.getElementById('canvas-area');
    area.addEventListener('dragover', e=>{e.preventDefault(); e.dataTransfer.dropEffect='copy';});
    area.addEventListener('drop', e=>{
      e.preventDefault();
      if(!this.currentBoardId) return;
      const files = e.dataTransfer.files;
      let offset = 0;
      for(const f of files){
        if(f.type.startsWith('image/')){
          const reader = new FileReader();
          reader.onload = ev=>{
            const pt = this.canvas.getPointer(e);
            this.addImageFromDataUrl(ev.target.result, pt.x + offset, pt.y + offset);
            offset += 30;
          };
          reader.readAsDataURL(f);
        }
      }
    });
  }

  // ─── Clipboard Paste ───
  setupPaste(){
    document.addEventListener('paste', e=>{
      if(!this.currentBoardId) return;
      if(e.target.tagName==='INPUT') return;
      if(this.isTextEditing()) return;

      const items = e.clipboardData?.items;
      if(!items) return;

      // Check for images first
      for(const item of items){
        if(item.type.startsWith('image/')){
          const blob = item.getAsFile();
          const reader = new FileReader();
          reader.onload = ev => this.addImageFromDataUrl(ev.target.result);
          reader.readAsDataURL(blob);
          e.preventDefault();
          return;
        }
      }
      // Text paste
      const text = e.clipboardData?.getData('text');
      if(text && text.trim()){
        this.addTextAtCenter(text);
        e.preventDefault();
      }
    });
  }

  // ─── Window Resize ───
  setupResize(){
    const resize = ()=>{
      const area = document.getElementById('canvas-area');
      this.canvas.setWidth(area.clientWidth);
      this.canvas.setHeight(area.clientHeight);
      this.canvas.requestRenderAll();
    };
    window.addEventListener('resize', resize);
    // Initial delay for layout
    setTimeout(resize, 100);
  }

  // ─── Board Management ───
  async loadAllBoards(){
    const all = await this.db.getAll();
    all.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    all.forEach(b=>{this.boards[b.id]=b;});
    this.updateBoardList();
    if(all.length > 0){
      this.selectBoard(all[0].id);
    }
  }

  promptNewBoard(){
    this.showModal('Nuevo Board',
      '<input id="modal-input" placeholder="Nombre del board" value="Board '+(Object.keys(this.boards).length+1)+'">',
      [{label:'Cancelar'},{label:'Crear', primary:true, action:()=>{
        const name = document.getElementById('modal-input').value.trim();
        if(name) this.createBoard(name);
      }}]
    );
    setTimeout(()=>{const inp=document.getElementById('modal-input');if(inp){inp.focus();inp.select();}},50);
  }

  async createBoard(name){
    const id = uuid();
    const board = {id, name, items:[], createdAt:Date.now()};
    this.boards[id] = board;
    await this.db.put(board);
    this.updateBoardList();
    this.selectBoard(id);
  }

  async selectBoard(id){
    if(this.currentBoardId) await this.saveCurrentBoard();
    this.currentBoardId = id;
    this.updateBoardList();
    await this.loadBoardToCanvas(id);
    document.getElementById('empty-label').style.display = 'none';
    document.getElementById('toolbar').style.display = '';
  }

  async deleteBoard(id){
    if(!confirm(`Eliminar "${this.boards[id]?.name}"?`)) return;
    delete this.boards[id];
    await this.db.del(id);
    if(this.currentBoardId === id){
      this.currentBoardId = null;
      this.canvas.clear();
      this.canvas.requestRenderAll();
      document.getElementById('empty-label').style.display = '';
      document.getElementById('toolbar').style.display = 'none';
    }
    this.updateBoardList();
    this.updateElementList();
  }

  promptRename(id){
    const board = this.boards[id];
    if(!board) return;
    this.showModal('Renombrar Board',
      '<input id="modal-input" value="'+board.name.replace(/"/g,'&quot;')+'">',
      [{label:'Cancelar'},{label:'Renombrar', primary:true, action:async()=>{
        const name = document.getElementById('modal-input').value.trim();
        if(name){board.name=name; await this.db.put(board); this.updateBoardList();}
      }}]
    );
    setTimeout(()=>{const inp=document.getElementById('modal-input');if(inp){inp.focus();inp.select();}},50);
  }

  async saveCurrentBoard(){
    if(!this.currentBoardId || !this.boards[this.currentBoardId]) return;
    this.boards[this.currentBoardId].items = this.serializeItems();
    await this.db.put(this.boards[this.currentBoardId]);
    if(this._fileHandle) this.saveToFile();
  }

  async loadBoardToCanvas(id){
    this._undoLocked = true;
    this.canvas.clear();
    const board = this.boards[id];
    if(!board || !board.items) { this.canvas.requestRenderAll(); this._undoLocked = false; this._initUndoState(); return; }

    // Sort by z-index
    const sorted = [...board.items].sort((a,b)=>(a.z||0)-(b.z||0));

    for(const item of sorted){
      try{
        if(item.type === 'image'){
          await this.loadImageItem(item);
        } else if(item.type === 'text'){
          this.loadTextItem(item);
        } else if(item.type === 'path'){
          if(item.isEraser) continue; // skip old eraser strokes
          this.loadPathItem(item);
        } else if(item.type === 'arrow'){
          this.loadArrowItem(item);
        }
      }catch(e){console.error('Error loading item:',e);}
    }
    // Reset view
    this.canvas.setViewportTransform([1,0,0,1,0,0]);
    this.updateZoomLabel();
    this.canvas.requestRenderAll();
    this.updateElementList();
    this._undoLocked = false;
    this._initUndoState();
  }

  loadImageItem(item){
    return new Promise(resolve=>{
      const src = item.image_data.startsWith('data:') ? item.image_data : 'data:image/png;base64,'+item.image_data;
      fabric.Image.fromURL(src, img=>{
        if(!img){resolve();return;}
        const sw = (item.width||img.width) / img.width;
        const sh = (item.height||img.height) / img.height;
        img.set({left:item.x||0, top:item.y||0, scaleX:sw, scaleY:sh, lockUniScaling:true});
        img.itemId = item.id || uuid();
        img._originalDataUrl = src;
        img._origW = img.width;
        img._origH = img.height;
        if(item.customName) img._customName = item.customName;
        this.canvas.add(img);
        resolve();
      },{crossOrigin:'anonymous'});
    });
  }

  loadTextItem(item){
    const t = new fabric.IText(item.text||'Texto',{
      left:item.x||0, top:item.y||0,
      fontSize: item.font_size||16,
      fill: item.color||'#e0e0e0',
      fontFamily: item.fontFamily||'Inter',
      fontWeight: item.fontWeight||'normal',
      fontStyle: item.fontStyle||'normal',
      underline: !!item.underline,
      textBackgroundColor: (item.bg_color && item.bg_color!=='transparent') ? item.bg_color : '',
    });
    t.itemId = item.id || uuid();
    if(item.customName) t._customName = item.customName;
    this.canvas.add(t);
  }

  loadPathItem(item){
    const opts = {
      left: item.x||0, top: item.y||0,
      stroke: item.stroke||'#e0e0e0',
      strokeWidth: item.strokeWidth||3,
      fill: item.fill||'',
      strokeLineCap: 'round', strokeLineJoin: 'round',
      scaleX: item.scaleX||1, scaleY: item.scaleY||1,
      selectable: false, evented: false, hoverCursor: 'default',
    };
    const p = new fabric.Path(item.path, opts);
    p.itemId = item.id || uuid();
    if(item.customName) p._customName = item.customName;
    this.canvas.add(p);
  }

  loadArrowItem(item){
    const arrow = this.createArrow(item.x1||0, item.y1||0, item.x2||100, item.y2||100, item.arrowType||'straight');
    if(item.stroke) arrow.set('stroke', item.stroke);
    if(item.strokeWidth) arrow.set('strokeWidth', item.strokeWidth);
    if(item.scaleX) arrow.set('scaleX', item.scaleX);
    if(item.scaleY) arrow.set('scaleY', item.scaleY);
    arrow.set({left: item.x||arrow.left, top: item.y||arrow.top});
    arrow.itemId = item.id || arrow.itemId;
    if(item.customName) arrow._customName = item.customName;
    arrow.setCoords();
  }

  // ─── Serialization ───
  serializeItems(){
    const items = [];
    this.canvas.getObjects().forEach((obj,idx)=>{
      if(obj._isSelectRect) return; // skip selection rect
      if(obj.type === 'image'){
        items.push({
          type:'image', id: obj.itemId||uuid(),
          x:obj.left, y:obj.top, z:idx,
          width: Math.round(obj.width*obj.scaleX),
          height: Math.round(obj.height*obj.scaleY),
          image_data: obj._originalDataUrl || '',
          customName: obj._customName || undefined
        });
      } else if(obj.type === 'i-text'){
        items.push({
          type:'text', id: obj.itemId||uuid(),
          x:obj.left, y:obj.top, z:idx,
          text: obj.text,
          font_size: obj.fontSize,
          color: obj.fill,
          bg_color: obj.textBackgroundColor || 'transparent',
          fontFamily: obj.fontFamily || 'Inter',
          fontWeight: obj.fontWeight || 'normal',
          fontStyle: obj.fontStyle || 'normal',
          underline: !!obj.underline,
          customName: obj._customName || undefined
        });
      } else if(obj.type === 'path' && obj._arrowData){
        items.push({
          type:'arrow', id: obj.itemId||uuid(),
          x:obj.left, y:obj.top, z:idx,
          arrowType: obj._arrowData.type,
          x1:obj._arrowData.x1, y1:obj._arrowData.y1,
          x2:obj._arrowData.x2, y2:obj._arrowData.y2,
          stroke: obj.stroke, strokeWidth: obj.strokeWidth,
          scaleX: obj.scaleX, scaleY: obj.scaleY,
          customName: obj._customName || undefined
        });
      } else if(obj.type === 'path' && !obj._arrowData){
        if(obj === this._arrowPreview) return; // skip preview
        items.push({
          type:'path', id: obj.itemId||uuid(),
          x:obj.left, y:obj.top, z:idx,
          path: obj.path,
          stroke: obj.stroke,
          strokeWidth: obj.strokeWidth,
          scaleX: obj.scaleX, scaleY: obj.scaleY,
          fill: obj.fill || '',
          customName: obj._customName || undefined
        });
      }
    });
    return items;
  }

  // ─── Add Items ───
  addText(initialText){
    if(!this.currentBoardId) return;
    const center = this.getViewportCenter();
    const t = new fabric.IText(initialText || 'Texto',{
      left:center.x-40, top:center.y-15,
      fontSize:16, fill:'#e0e0e0', fontFamily:'Inter',
    });
    t.itemId = uuid();
    this.canvas.add(t);
    this.canvas.setActiveObject(t);
    t.enterEditing();
    t.selectAll();
    this.canvas.requestRenderAll();
  }

  addTextAtCenter(text){
    if(!this.currentBoardId) return;
    const center = this.getViewportCenter();
    const t = new fabric.IText(text,{
      left:center.x-40, top:center.y-15,
      fontSize:16, fill:'#e0e0e0', fontFamily:'Inter',
    });
    t.itemId = uuid();
    this.canvas.add(t);
    this.canvas.setActiveObject(t);
    this.canvas.requestRenderAll();
  }

  addImage(){
    if(!this.currentBoardId) return;
    const input = document.getElementById('file-input');
    input.value = '';
    input.onchange = ()=>{
      let offset = 0;
      for(const f of input.files){
        const reader = new FileReader();
        reader.onload = ev=>{
          this.addImageFromDataUrl(ev.target.result, undefined, undefined, offset);
          offset += 30;
        };
        reader.readAsDataURL(f);
      }
    };
    input.click();
  }

  addImageFromDataUrl(dataUrl, x, y, offset=0){
    fabric.Image.fromURL(dataUrl, img=>{
      if(!img) return;
      // Scale down large images
      const maxDim = 800;
      let scale = 1;
      if(img.width > maxDim || img.height > maxDim){
        scale = maxDim / Math.max(img.width, img.height);
      }
      const center = this.getViewportCenter();
      img.set({
        left: (x != null ? x : center.x - (img.width*scale)/2) + offset,
        top: (y != null ? y : center.y - (img.height*scale)/2) + offset,
        scaleX: scale, scaleY: scale,
        lockUniScaling: true,
      });
      img.itemId = uuid();
      img._originalDataUrl = dataUrl;
      img._origW = img.width;
      img._origH = img.height;
      this.canvas.add(img);
      this.canvas.setActiveObject(img);
      this.canvas.requestRenderAll();
    },{crossOrigin:'anonymous'});
  }

  deleteSelected(){
    const active = this.canvas.getActiveObjects();
    if(active.length === 0) return;
    active.forEach(o=> this.canvas.remove(o));
    this.canvas.discardActiveObject();
    this.canvas.requestRenderAll();
  }

  // ─── Zoom ───
  zoomIn(){
    let zoom = this.canvas.getZoom() * 1.25;
    zoom = Math.min(5, zoom);
    const center = {x:this.canvas.width/2, y:this.canvas.height/2};
    this.canvas.zoomToPoint(center, zoom);
    this.updateZoomLabel();
  }

  zoomOut(){
    let zoom = this.canvas.getZoom() * 0.8;
    zoom = Math.max(0.02, zoom);
    const center = {x:this.canvas.width/2, y:this.canvas.height/2};
    this.canvas.zoomToPoint(center, zoom);
    this.updateZoomLabel();
  }

  zoomReset(){
    this.canvas.setViewportTransform([1,0,0,1,0,0]);
    this.updateZoomLabel();
  }

  fitAll(){
    const objs = this.canvas.getObjects();
    if(objs.length === 0){this.zoomReset(); return;}

    // Reset transform to get true object coordinates
    const savedVpt = [...this.canvas.viewportTransform];
    this.canvas.setViewportTransform([1,0,0,1,0,0]);

    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    objs.forEach(o=>{
      const r = o.getBoundingRect();
      minX=Math.min(minX,r.left); minY=Math.min(minY,r.top);
      maxX=Math.max(maxX,r.left+r.width); maxY=Math.max(maxY,r.top+r.height);
    });

    const margin = 50;
    const cw = maxX-minX+2*margin, ch = maxY-minY+2*margin;
    const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
    const zoom = Math.min(this.canvas.width/cw, this.canvas.height/ch, 5);

    this.canvas.setViewportTransform([
      zoom, 0, 0, zoom,
      this.canvas.width/2 - cx*zoom,
      this.canvas.height/2 - cy*zoom
    ]);
    this.updateZoomLabel();
    this.canvas.requestRenderAll();
  }

  updateZoomLabel(){
    document.getElementById('zoom-label').textContent = Math.round(this.canvas.getZoom()*100)+'%';
  }

  showZoomDropdown(e){
    e.preventDefault(); e.stopPropagation();
    const dd = document.getElementById('zoom-dropdown');
    dd.innerHTML = '';
    const items = [
      {label:'Acercar', shortcut:'Ctrl++', action:()=>this.zoomIn(), svg:'<svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="5" y1="7" x2="9" y2="7"/><line x1="7" y1="5" x2="7" y2="9"/></svg>'},
      {label:'Alejar', shortcut:'Ctrl+-', action:()=>this.zoomOut(), svg:'<svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/><line x1="5" y1="7" x2="9" y2="7"/></svg>'},
      {label:'Resetear zoom', shortcut:'Ctrl+0', action:()=>this.zoomReset(), svg:'<svg viewBox="0 0 16 16"><path d="M4 8a4 4 0 1 1 1 3"/><polyline points="2,7 4,10 7,8"/></svg>'},
    ];
    items.forEach(t=>{
      const div = document.createElement('div');
      div.className = 'ctx-item';
      div.innerHTML = t.svg+'<span style="flex:1">'+t.label+'</span><span style="font-size:9px;color:var(--text3)">'+t.shortcut+'</span>';
      div.onclick = ()=>{ dd.style.display='none'; t.action(); };
      dd.appendChild(div);
    });
    const btn = document.getElementById('zoom-btn');
    const r = btn.getBoundingClientRect();
    dd.style.display = 'block';
    dd.style.position = 'fixed';
    dd.style.left = (r.left - dd.offsetWidth - 8)+'px';
    dd.style.top = (r.top)+'px';
    const hide = ev=>{if(!dd.contains(ev.target)){dd.style.display='none';document.removeEventListener('mousedown',hide);}};
    setTimeout(()=>document.addEventListener('mousedown',hide),0);
  }

  getViewportCenter(){
    const vpt = this.canvas.viewportTransform;
    const inv = fabric.util.invertTransform(vpt);
    return fabric.util.transformPoint(
      new fabric.Point(this.canvas.width/2, this.canvas.height/2), inv
    );
  }

  // ─── Export ───
  promptExport(){
    if(!this.currentBoardId) return;
    if(this.canvas.getObjects().length===0){alert('El board esta vacio.'); return;}
    this.showModal('Exportar Board','Selecciona el formato de exportacion:',[
      {label:'PNG', primary:true, action:()=>this.exportAs('png')},
      {label:'JPEG', action:()=>this.exportAs('jpeg')},
      {label:'PDF', action:()=>this.exportAs('pdf')},
    ]);
  }

  exportAs(format){
    this.canvas.discardActiveObject();
    this.canvas.requestRenderAll();

    // Get bounds
    const objs = this.canvas.getObjects();
    const savedVpt = [...this.canvas.viewportTransform];
    this.canvas.setViewportTransform([1,0,0,1,0,0]);

    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    objs.forEach(o=>{
      const r=o.getBoundingRect();
      minX=Math.min(minX,r.left);minY=Math.min(minY,r.top);
      maxX=Math.max(maxX,r.left+r.width);maxY=Math.max(maxY,r.top+r.height);
    });
    const margin=50;
    const left=minX-margin, top_=minY-margin;
    const width=maxX-minX+2*margin, height=maxY-minY+2*margin;

    // Render to export canvas (without grid, with bg)
    const maxDim = 8000;
    let multiplier = 1;
    if(width > maxDim || height > maxDim) multiplier = maxDim / Math.max(width, height);

    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = Math.round(width * multiplier);
    exportCanvas.height = Math.round(height * multiplier);
    const ctx = exportCanvas.getContext('2d');

    // Fill background
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
    ctx.fillRect(0,0,exportCanvas.width,exportCanvas.height);

    // Draw each object
    ctx.save();
    ctx.scale(multiplier, multiplier);
    ctx.translate(-left, -top_);
    objs.forEach(o=>{
      ctx.save();
      const m = o.calcTransformMatrix();
      ctx.transform(m[0],m[1],m[2],m[3],m[4],m[5]);
      o.drawObject(ctx);
      ctx.restore();
    });
    ctx.restore();

    // Restore viewport
    this.canvas.setViewportTransform(savedVpt);
    this.canvas.requestRenderAll();

    const fileName = 'board_'+(this.currentBoardId||'').substr(0,6);

    if(format === 'pdf'){
      const {jsPDF} = window.jspdf;
      const pxToMm = 25.4/96;
      const wMm = width*pxToMm, hMm = height*pxToMm;
      const pdf = new jsPDF({orientation:width>height?'l':'p', unit:'mm', format:[wMm,hMm]});
      const imgData = exportCanvas.toDataURL('image/png');
      pdf.addImage(imgData,'PNG',0,0,wMm,hMm);
      pdf.save(fileName+'.pdf');
    } else {
      const link = document.createElement('a');
      link.download = fileName+'.'+format;
      link.href = exportCanvas.toDataURL('image/'+format, format==='jpeg'?0.95:undefined);
      link.click();
    }
  }

  // ─── Sidebar Updates ───
  updateBoardList(){
    const list = document.getElementById('board-list');
    list.innerHTML = '';
    Object.values(this.boards)
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0))
      .forEach(b=>{
        const div = document.createElement('div');
        div.className = 'board-item' + (b.id===this.currentBoardId?' active':'');
        div.textContent = b.name;
        div.onclick = ()=> this.selectBoard(b.id);
        div.oncontextmenu = e=>{
          e.preventDefault();
          this.showBoardContextMenu(e.clientX, e.clientY, b.id);
        };
        list.appendChild(div);
      });
  }

  updateElementList(){
    const list = document.getElementById('element-list');
    list.innerHTML = '';
    const objs = this.canvas.getObjects().slice().sort((a,b)=>(a.top||0)-(b.top||0));
    objs.forEach((obj,i)=>{
      if(obj._isSelectRect) return;
      const div = document.createElement('div');
      div.className = 'el-item';
      const active = this.canvas.getActiveObject();
      if(active === obj) div.classList.add('active');

      let icon, defaultLabel;
      if(obj.type === 'image'){
        icon = '<svg class="el-icon" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" rx="1"/><polyline points="2,11 5,8 8,10 11,6 14,11"/></svg>';
        defaultLabel = 'Imagen '+(i+1);
      } else if(obj.type === 'i-text'){
        icon = '<svg class="el-icon" viewBox="0 0 16 16"><line x1="3" y1="5" x2="13" y2="5"/><line x1="8" y1="5" x2="8" y2="13"/></svg>';
        const txt = obj.text.replace(/\n/g,' ');
        defaultLabel = txt.length > 15 ? txt.substr(0,15)+'...' : txt;
      } else if(obj.type === 'path' && obj._arrowData){
        icon = '<svg class="el-icon" viewBox="0 0 16 16"><line x1="3" y1="13" x2="13" y2="3"/><polyline points="8,3 13,3 13,8"/></svg>';
        defaultLabel = 'Flecha '+(i+1);
      } else if(obj.type === 'path'){
        if(obj === this._arrowPreview) return;
        icon = '<svg class="el-icon" viewBox="0 0 16 16"><path d="M11 2.5l2.5 2.5L5.5 13H3v-2.5L11 2.5z" fill="none"/></svg>';
        defaultLabel = 'Dibujo '+(i+1);
      } else return;

      const label = obj._customName || defaultLabel;
      const span = document.createElement('span');
      span.textContent = label;
      div.innerHTML = icon;
      div.appendChild(span);

      div.onclick = ()=>{
        this.canvas.setActiveObject(obj);
        const center = obj.getCenterPoint();
        const zoom = this.canvas.getZoom();
        const vpt = this.canvas.viewportTransform;
        vpt[4] = this.canvas.width/2 - center.x*zoom;
        vpt[5] = this.canvas.height/2 - center.y*zoom;
        this.canvas.requestRenderAll();
      };
      div.ondblclick = (e)=>{
        e.stopPropagation();
        this._editElementName(span, obj, defaultLabel);
      };
      list.appendChild(div);
    });
  }

  _editElementName(span, obj, defaultLabel){
    const input = document.createElement('input');
    input.type = 'text';
    input.value = obj._customName || defaultLabel;
    input.className = 'el-name-input';
    span.replaceWith(input);
    input.focus();
    input.select();

    const finish = ()=>{
      const val = input.value.trim();
      if(val && val !== defaultLabel){
        obj._customName = val;
      } else {
        delete obj._customName;
      }
      this.updateElementList();
    };
    input.onblur = finish;
    input.onkeydown = e=>{
      if(e.key === 'Enter'){ e.preventDefault(); input.blur(); }
      if(e.key === 'Escape'){ input.value = ''; input.blur(); }
    };
  }

  highlightElement(obj){
    document.querySelectorAll('.el-item').forEach((el,i)=>{

  // ─── Undo / Redo ───
  _saveUndoState(){
    if(this._undoLocked) return;
    const json = JSON.stringify(this.canvas.toJSON(['itemId','_arrowData','_originalDataUrl','_origW','_origH','_customName']));
    // Avoid duplicate consecutive states
    if(this._undoStack.length && this._undoStack[this._undoStack.length-1] === json) return;
    this._undoStack.push(json);
    if(this._undoStack.length > 80) this._undoStack.shift(); // limit history
    this._redoStack = [];
  }

  _initUndoState(){
    this._undoStack = [];
    this._redoStack = [];
    this._saveUndoState();
  }

  undo(){
    if(this._undoStack.length <= 1) return; // need at least 1 state to revert to
    this._redoStack.push(this._undoStack.pop());
    const state = this._undoStack[this._undoStack.length - 1];
    this._loadCanvasState(state);
  }

  redo(){
    if(!this._redoStack.length) return;
    const state = this._redoStack.pop();
    this._undoStack.push(state);
    this._loadCanvasState(state);
  }

  _loadCanvasState(json){
    this._undoLocked = true;
    this.canvas.loadFromJSON(json, ()=>{
      // Re-lock pencil paths (non-arrow paths)
      this.canvas.getObjects('path').forEach(p=>{
        if(!p._arrowData){
          p.set({selectable:false, evented:false, hoverCursor:'default'});
        }
      });
      this.canvas.requestRenderAll();
      this.updateElementList();
      this._undoLocked = false;
    });
  }

  // ─── Tool System ───
  setTool(tool){
    if(!this.currentBoardId && tool !== 'move') return;
    const prev = this._activeTool;
    if(prev === tool && tool !== 'move') { this.setTool('move'); return; } // toggle off

    // Deactivate previous tool
    this._deactivateTool(prev);
    this._activeTool = tool;

    // Activate new tool
    const c = this.canvas;
    document.querySelectorAll('#move-btn,#select-btn,#draw-btn,#arrow-btn,#eraser-btn').forEach(b=>b.classList.remove('tool-active'));

    if(tool === 'move'){
      c.isDrawingMode = false;
      c.selection = true;
      c.defaultCursor = 'default';
      document.getElementById('move-btn').classList.add('tool-active');
    } else if(tool === 'select'){
      c.isDrawingMode = false;
      c.selection = false;
      c.defaultCursor = 'crosshair';
      c.setCursor('crosshair');
      document.getElementById('select-btn').classList.add('tool-active');
    } else if(tool === 'draw'){
      c.isDrawingMode = true;
      c.freeDrawingBrush = new fabric.PencilBrush(c);
      c.freeDrawingBrush.color = this._drawColor;
      c.freeDrawingBrush.width = this._drawSize;
      document.getElementById('draw-btn').classList.add('tool-active');
      document.getElementById('draw-panel').style.display = 'block';
      this.initDrawColors();
    } else if(tool === 'arrow'){
      c.isDrawingMode = false;
      c.selection = false;
      c.defaultCursor = 'crosshair';
      c.setCursor('crosshair');
      document.getElementById('arrow-btn').classList.add('tool-active');
      document.getElementById('arrow-panel').style.display = 'block';
      this.initArrowColors();
    } else if(tool === 'eraser'){
      c.isDrawingMode = false;
      c.selection = false;
      c.defaultCursor = 'crosshair';
      c.setCursor('crosshair');
      document.getElementById('eraser-btn').classList.add('tool-active');
    }
  }

  _deactivateTool(tool){
    const c = this.canvas;
    if(tool === 'draw'){
      c.isDrawingMode = false;
      document.getElementById('draw-panel').style.display = 'none';
    } else if(tool === 'arrow'){
      this._cancelArrow();
      c.selection = true;
      c.defaultCursor = 'default';
      document.getElementById('arrow-panel').style.display = 'none';
    } else if(tool === 'eraser'){
      this._erasing = false;
      c.selection = true;
      c.defaultCursor = 'default';
    } else if(tool === 'select'){
      this._selecting = false;
      this._removeSelectRect();
      c.selection = true;
      c.defaultCursor = 'default';
    }
  }

  toggleDrawing(){ this.setTool(this._activeTool === 'draw' ? 'move' : 'draw'); }

  // ─── Selection Tool ───
  _updateSelectRect(start, end){
    const left = Math.min(start.x, end.x);
    const top = Math.min(start.y, end.y);
    const width = Math.abs(end.x - start.x);
    const height = Math.abs(end.y - start.y);
    if(this._selectRect){
      this._selectRect.set({left, top, width, height});
      this._selectRect.setCoords();
    } else {
      this._selectRect = new fabric.Rect({
        left, top, width, height,
        fill: 'rgba(108,99,255,0.08)',
        stroke: 'rgba(108,99,255,0.7)',
        strokeWidth: 1,
        strokeDashArray: [5, 3],
        selectable: false, evented: false,
        excludeFromExport: true,
      });
      this._selectRect._isSelectRect = true;
      this.canvas.add(this._selectRect);
    }
    this.canvas.requestRenderAll();
  }

  _removeSelectRect(){
    if(this._selectRect){
      this.canvas.remove(this._selectRect);
      this._selectRect = null;
    }
  }

  _finishSelectRect(){
    if(!this._selectRect || !this._selectStart) return;
    const rect = this._selectRect.getBoundingRect();
    const objs = this.canvas.getObjects().filter(o=>{
      if(o._isSelectRect) return false;
      if(o === this._arrowPreview) return false;
      // For locked paths, temporarily check intersection
      const br = o.getBoundingRect();
      return br.left < rect.left+rect.width && br.left+br.width > rect.left &&
             br.top < rect.top+rect.height && br.top+br.height > rect.top;
    });
    this._removeSelectRect();
    this._selectStart = null;
    if(objs.length > 0){
      const sel = new fabric.ActiveSelection(objs, {canvas: this.canvas});
      this.canvas.setActiveObject(sel);
      this.canvas.requestRenderAll();
    }
  }

  _erasePencilAt(e){
    const pointer = this.canvas.getPointer(e);
    const r = this._eraserSize / this.canvas.getZoom();
    const toRemove = [];
    this.canvas.getObjects().forEach(obj=>{
      // Only erase pencil paths (not arrows, not select rects, not text, not images)
      if(obj.type !== 'path' || obj._arrowData || obj._isSelectRect) return;
      // Compare in logical canvas coords using object center + dimensions
      const center = obj.getCenterPoint();
      const hw = (obj.width * (obj.scaleX || 1)) / 2 + r;
      const hh = (obj.height * (obj.scaleY || 1)) / 2 + r;
      if(Math.abs(pointer.x - center.x) <= hw && Math.abs(pointer.y - center.y) <= hh){
        toRemove.push(obj);
      }
    });
    toRemove.forEach(obj=> this.canvas.remove(obj));
    if(toRemove.length) this.canvas.requestRenderAll();
  }

  _cancelArrow(){
    if(this._arrowPreview){
      this.canvas.remove(this._arrowPreview);
      this._arrowPreview = null;
    }
    this._arrowStart = null;
  }

  createArrow(x1, y1, x2, y2, type){
    const headLen = 12;
    const color = this._drawColor;
    let pathStr, group;

    if(type === 'straight'){
      const angle = Math.atan2(y2-y1, x2-x1);
      // Arrow line + head
      const hx1 = x2 - headLen * Math.cos(angle - Math.PI/6);
      const hy1 = y2 - headLen * Math.sin(angle - Math.PI/6);
      const hx2 = x2 - headLen * Math.cos(angle + Math.PI/6);
      const hy2 = y2 - headLen * Math.sin(angle + Math.PI/6);
      pathStr = `M ${x1} ${y1} L ${x2} ${y2} M ${hx1} ${hy1} L ${x2} ${y2} L ${hx2} ${hy2}`;
    } else {
      // Curved arrow: quadratic bezier
      const mx = (x1+x2)/2, my = (y1+y2)/2;
      const dx = x2-x1, dy = y2-y1;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const offset = dist * 0.25;
      // Perpendicular direction
      const nx = -dy/dist, ny = dx/dist;
      const cx = mx + nx*offset, cy = my + ny*offset;
      // Tangent at endpoint for arrowhead direction
      // For Q bezier: tangent at t=1 is direction from control to end
      const tx = x2-cx, ty = y2-cy;
      const ta = Math.atan2(ty, tx);
      const hx1 = x2 - headLen * Math.cos(ta - Math.PI/6);
      const hy1 = y2 - headLen * Math.sin(ta - Math.PI/6);
      const hx2 = x2 - headLen * Math.cos(ta + Math.PI/6);
      const hy2 = y2 - headLen * Math.sin(ta + Math.PI/6);
      pathStr = `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2} M ${hx1} ${hy1} L ${x2} ${y2} L ${hx2} ${hy2}`;
    }

    const arrow = new fabric.Path(pathStr, {
      stroke: color, strokeWidth: this._arrowSize, fill: '',
      strokeLineCap: 'round', strokeLineJoin: 'round',
      selectable: true, evented: true,
    });
    arrow.itemId = uuid();
    arrow._arrowData = { type, x1, y1, x2, y2 };
    this.canvas.add(arrow);
    this.canvas.requestRenderAll();
    return arrow;
  }

  _createArrowPreview(x1, y1, x2, y2){
    if(this._arrowPreview) this.canvas.remove(this._arrowPreview);
    const type = this._arrowType;
    const headLen = 10;
    let pathStr;

    if(type === 'straight'){
      const angle = Math.atan2(y2-y1, x2-x1);
      const hx1 = x2 - headLen * Math.cos(angle - Math.PI/6);
      const hy1 = y2 - headLen * Math.sin(angle - Math.PI/6);
      const hx2 = x2 - headLen * Math.cos(angle + Math.PI/6);
      const hy2 = y2 - headLen * Math.sin(angle + Math.PI/6);
      pathStr = `M ${x1} ${y1} L ${x2} ${y2} M ${hx1} ${hy1} L ${x2} ${y2} L ${hx2} ${hy2}`;
    } else {
      const mx = (x1+x2)/2, my = (y1+y2)/2;
      const dx = x2-x1, dy = y2-y1;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const offset = dist * 0.25;
      const nx = -dy/dist, ny = dx/dist;
      const cx = mx + nx*offset, cy = my + ny*offset;
      const tx = x2-cx, ty = y2-cy;
      const ta = Math.atan2(ty, tx);
      const hx1 = x2 - headLen * Math.cos(ta - Math.PI/6);
      const hy1 = y2 - headLen * Math.sin(ta - Math.PI/6);
      const hx2 = x2 - headLen * Math.cos(ta + Math.PI/6);
      const hy2 = y2 - headLen * Math.sin(ta + Math.PI/6);
      pathStr = `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2} M ${hx1} ${hy1} L ${x2} ${y2} L ${hx2} ${hy2}`;
    }

    this._arrowPreview = new fabric.Path(pathStr, {
      stroke: this._drawColor, strokeWidth: this._arrowSize, fill: '',
      strokeLineCap: 'round', strokeLineJoin: 'round',
      strokeDashArray: [6, 4],
      selectable: false, evented: false,
    });
    this.canvas.add(this._arrowPreview);
    this.canvas.requestRenderAll();
  }

  _onSelectionChange(opt){
    const sel = this.canvas.getActiveObject();
    if(sel && sel.type === 'i-text'){
      this._showTextPanel(sel);
    } else {
      this._hideTextPanel();

  _showTextPanel(textObj){
    this._textTarget = textObj;
    const panel = document.getElementById('text-panel');
    panel.style.display = 'block';
    // Sync controls with object
    document.getElementById('text-font').value = textObj.fontFamily || 'Inter';
    document.getElementById('text-size-slider').value = textObj.fontSize || 16;
    document.getElementById('text-size-val').textContent = (textObj.fontSize||16)+'px';
    document.getElementById('text-bold').classList.toggle('active', textObj.fontWeight === 'bold');
    document.getElementById('text-italic').classList.toggle('active', textObj.fontStyle === 'italic');
    document.getElementById('text-underline').classList.toggle('active', !!textObj.underline);
    this._initTextColors(textObj.fill || '#e0e0e0');
  }

  _hideTextPanel(){
    document.getElementById('text-panel').style.display = 'none';
    this._textTarget = null;
  }

  _initTextColors(currentColor){
    const container = document.getElementById('text-colors');
    container.innerHTML = '';
    COLORS_TEXT.forEach(c=>{
      const dot = document.createElement('div');
      dot.className = 'dp-color' + (c.hex===currentColor?' active':'');
      dot.style.background = c.hex;
      dot.title = c.name;
      dot.onclick = ()=> this._setTextProp('fill', c.hex);
      container.appendChild(dot);
    });
  }

  _setTextProp(prop, val){
    const t = this._textTarget;
    if(!t) return;
    t.set(prop, val);
    this.canvas.requestRenderAll();
    // Sync UI
    if(prop === 'fontSize'){
      document.getElementById('text-size-val').textContent = val+'px';
    }
    if(prop === 'fill'){
      document.querySelectorAll('#text-colors .dp-color').forEach(el=>{
        el.classList.toggle('active', this.normalizeColor(el.style.backgroundColor) === val);
      });
    }
    this._saveUndoState();
  }

  _toggleTextFormat(type){
    const t = this._textTarget;
    if(!t) return;
    if(type === 'bold'){
      t.set('fontWeight', t.fontWeight === 'bold' ? 'normal' : 'bold');
      document.getElementById('text-bold').classList.toggle('active', t.fontWeight === 'bold');
    } else if(type === 'italic'){
      t.set('fontStyle', t.fontStyle === 'italic' ? 'normal' : 'italic');
      document.getElementById('text-italic').classList.toggle('active', t.fontStyle === 'italic');
    } else if(type === 'underline'){
      t.set('underline', !t.underline);
      document.getElementById('text-underline').classList.toggle('active', !!t.underline);
    }
    this.canvas.requestRenderAll();
    this._saveUndoState();
  }

  normalizeColor(c){
    const d = document.createElement('div');
    d.style.color = c;
    document.body.appendChild(d);
    const computed = getComputedStyle(d).color;
    document.body.removeChild(d);
    const m = computed.match(/\d+/g);
    if(m && m.length>=3) return '#'+m.slice(0,3).map(n=>(+n).toString(16).padStart(2,'0')).join('');
    return c;
  }

  // ─── Toolbar ───
  toggleToolbar(){
    this.toolbarExpanded = !this.toolbarExpanded;
    document.getElementById('toolbar-panel').style.display = this.toolbarExpanded?'':'none';
