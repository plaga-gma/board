  // ─── File Save/Load ───
  _getExportData(){
    // Save current board state first
    if(this.currentBoardId && this.boards[this.currentBoardId]){
      this.boards[this.currentBoardId].items = this.serializeItems();
    }
    return JSON.stringify({
      version: 1,
      exportedAt: Date.now(),
      boards: Object.values(this.boards),
    }, null, 2);
  }

  _updateSaveFileLabel(name){
    const el = document.getElementById('save-file-name');
    if(el){
      el.textContent = name ? '\uD83D\uDCC4 ' + name : '';
      el.style.display = name ? 'block' : 'none';
    }
  }

  async saveAsFile(){
    const data = this._getExportData();
    // Try File System Access API (Chrome/Edge)
    if(window.showSaveFilePicker){
      try{
        const handle = await window.showSaveFilePicker({
          suggestedName: 'plagas_board_data.json',
          types:[{description:'JSON', accept:{'application/json':['.json']}}],
        });
        const writable = await handle.createWritable();
        await writable.write(data);
        await writable.close();
        this._fileHandle = handle;
        localStorage.setItem('pb_fileName', handle.name);
        this._updateSaveFileLabel(handle.name);
        return;
      }catch(e){
        if(e.name === 'AbortError') return; // user cancelled
      }
    }
    // Fallback: download
    const blob = new Blob([data], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'plagas_board_data.json';
    a.click();
    URL.revokeObjectURL(a.href);
    localStorage.setItem('pb_fileName', a.download);
    this._updateSaveFileLabel(a.download);
  }

  async saveToFile(){
    // Auto-save to existing file handle if available
    if(!this._fileHandle) return;
    try{
      const perm = await this._fileHandle.queryPermission({mode:'readwrite'});
      if(perm !== 'granted'){
        const req = await this._fileHandle.requestPermission({mode:'readwrite'});
        if(req !== 'granted') return;
      }
      const data = this._getExportData();
      const writable = await this._fileHandle.createWritable();
      await writable.write(data);
      await writable.close();
    }catch(e){
      console.warn('Auto-save to file failed:', e);
    }
  }

  async openFromFile(){
    // Try File System Access API
    if(window.showOpenFilePicker){
      try{
        const [handle] = await window.showOpenFilePicker({
          types:[{description:'JSON', accept:{'application/json':['.json']}}],
          multiple: false,
        });
        const file = await handle.getFile();
        const text = await file.text();
        await this._importData(text);
        this._fileHandle = handle;
        localStorage.setItem('pb_fileName', handle.name);
        this._updateSaveFileLabel(handle.name);
        return;
      }catch(e){
        if(e.name === 'AbortError') return;
      }
    }
    // Fallback: file input
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async()=>{
      const file = input.files[0];
      if(!file) return;
      const text = await file.text();
      await this._importData(text);
      localStorage.setItem('pb_fileName', file.name);
      this._updateSaveFileLabel(file.name);
    };
    input.click();
  }

  async _importData(jsonText){
    try{
      const data = JSON.parse(jsonText);
      if(!data.boards || !Array.isArray(data.boards)){
        alert('Archivo no válido: no contiene boards.');
        return;
      }
      // Clear existing boards from DB
      for(const id of Object.keys(this.boards)){
        await this.db.del(id);
      }
      this.boards = {};
      this.currentBoardId = null;
      this.canvas.clear();

      // Load imported boards
      for(const board of data.boards){
        this.boards[board.id] = board;
        await this.db.put(board);
      }
      this.updateBoardList();
      // Select first board
      const ids = Object.keys(this.boards);
      if(ids.length > 0) await this.selectBoard(ids[0]);
      else {
        document.getElementById('empty-label').style.display = '';
        document.getElementById('toolbar').style.display = 'none';
        this.updateElementList();
      }
    }catch(e){
      alert('Error al leer el archivo: ' + e.message);
    }
  }

  // ─── Modal ───
  showModal(title, bodyHtml, actions){
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    const actDiv = document.getElementById('modal-actions');
    actDiv.innerHTML='';
    actions.forEach(a=>{
      const btn = document.createElement('button');
      btn.textContent = a.label;
      btn.className = 'modal-btn' + (a.primary?' primary':'');
      btn.onclick = ()=>{this.hideModal(); if(a.action) a.action();};
      actDiv.appendChild(btn);
    });
    document.getElementById('modal-overlay').style.display='flex';
    // Enter key submits
    const inp = document.getElementById('modal-input');
    if(inp){
      inp.onkeydown = e=>{
        if(e.key==='Enter'){
          const primary = actDiv.querySelector('.primary');
          if(primary) primary.click();
        }
        if(e.key==='Escape') this.hideModal();
      };
    }
  }

  hideModal(){
    document.getElementById('modal-overlay').style.display='none';
  }

  // ─── Auto-save ───
  startAutoSave(){
    this._autoSaveTimer = setInterval(()=> this.saveCurrentBoard(), 10000);
  }

  // ─── Theme System ───
  _themes = [
    {id:'dark', label:'Oscuro', bg:'#1c1c1c', sidebar:'#141414', accent:'#6c63ff'},
    {id:'pastel-pink', label:'Rosa Pastel', bg:'#fce4ec', sidebar:'#f8bbd0', accent:'#e91e63'},
    {id:'ocean', label:'Océano', bg:'#0d1b2a', sidebar:'#0a1628', accent:'#0ea5e9'},
    {id:'forest', label:'Bosque', bg:'#1a2e1a', sidebar:'#142014', accent:'#4ade80'},
    {id:'sunset', label:'Atardecer', bg:'#1c1410', sidebar:'#18100c', accent:'#f97316'},
    {id:'light', label:'Claro', bg:'#f5f5f5', sidebar:'#e8e8e8', accent:'#6c63ff'},
    {id:'lavender', label:'Lavanda', bg:'#1e1a2e', sidebar:'#171328', accent:'#a78bfa'},
    {id:'crimson', label:'Carmesí', bg:'#1c1012', sidebar:'#150c0e', accent:'#ef4444'},
  ];

  showThemePanel(){
    const container = document.getElementById('tp-themes');
    container.innerHTML = '';
    const current = localStorage.getItem('pb_theme') || 'dark';
    this._themes.forEach(t=>{
      const div = document.createElement('div');
      div.className = 'tp-theme' + (t.id === current ? ' active' : '');
      div.title = t.label;
      div.innerHTML = '<div class="tp-theme-inner">'
        +'<div class="tp-theme-top" style="background:'+t.bg+'"></div>'
        +'<div class="tp-theme-bot"><span style="background:'+t.sidebar+'"></span><span style="background:'+t.accent+'"></span></div>'
        +'</div>';
      div.onclick = ()=> this.setTheme(t.id);
      container.appendChild(div);
      // Label
      const lbl = document.createElement('div');
      lbl.className = 'tp-theme-label';
      lbl.textContent = t.label;
      div.insertAdjacentElement('afterend', lbl);
    });
    document.getElementById('theme-panel').style.display = 'block';
    document.getElementById('theme-panel-overlay').style.display = 'block';
  }

  hideThemePanel(){
    document.getElementById('theme-panel').style.display = 'none';
    document.getElementById('theme-panel-overlay').style.display = 'none';
  }

  setTheme(id){
    document.documentElement.setAttribute('data-theme', id);
    localStorage.setItem('pb_theme', id);
    this.canvas.requestRenderAll();
    // Refresh theme panel selection
    document.querySelectorAll('.tp-theme').forEach(el=> el.classList.remove('active'));
    const idx = this._themes.findIndex(t=>t.id===id);
    const themes = document.querySelectorAll('.tp-theme');
    if(themes[idx]) themes[idx].classList.add('active');
  }

  restoreTheme(){
    const saved = localStorage.getItem('pb_theme');
    if(saved) document.documentElement.setAttribute('data-theme', saved);
  }

  // ─── Tutorial ───
  _tutSteps = [
    { selector: null, title: 'Bienvenido a plaga\'s board', desc: 'Un espacio infinito para tus ideas, dibujos y notas. Te mostraremos las funciones principales en unos pocos pasos.', pos: 'center' },
    { selector: '.sb-add', title: 'Crear un Board', desc: 'Haz click en el botón "+" para crear un nuevo board. Puedes tener múltiples boards y cambiar entre ellos.', pos: 'right' },
    { selector: '#toolbar', title: 'Barra de herramientas', desc: 'Aquí encontrarás todas las herramientas: mover, seleccionar, texto, imagen, dibujar, borrador y flechas. Usa el botón flotante "+" para mostrarla u ocultarla.', pos: 'top' },
    { selector: '#draw-btn', title: 'Dibujo libre', desc: 'Selecciona el lápiz (D) para dibujar libremente. Puedes cambiar el color y grosor del trazo.', pos: 'top' },
    { selector: '#eraser-btn', title: 'Borrador', desc: 'El borrador (X) elimina trazos de dibujo al pasar sobre ellos.', pos: 'top' },
    { selector: '#select-btn', title: 'Selección rectangular', desc: 'Dibuja un rectángulo para seleccionar múltiples elementos a la vez (M).', pos: 'top' },
    { selector: '.sb-el-hdr', title: 'Elementos del Board', desc: 'Aquí verás la lista de todos los elementos. Haz doble click en el nombre para renombrarlo.', pos: 'right' },
    { selector: '.sb-theme-btn', title: 'Temas de colores', desc: 'Cambia la apariencia de toda la aplicación con distintos temas de colores.', pos: 'right' },
    { selector: '.sb-file-actions', title: 'Guardar y Abrir', desc: 'Usa "Guardar como" para exportar tus boards a un archivo, y "Abrir archivo" para cargarlos de vuelta.', pos: 'right' },
    { selector: null, title: '¡Listo!', desc: 'Ya conoces lo básico. Usa Space + arrastrar para navegar el canvas, Ctrl+Z/Y para deshacer/rehacer, y la rueda del mouse para hacer zoom. ¡A crear!', pos: 'center' },
  ];
  _tutCurrent = -1;

  startTutorial(){
    this._tutCurrent = 0;
    this._showTutStep(0);
  }

  _showTutStep(idx){
    const overlay = document.getElementById('tut-overlay');
    const spot = document.getElementById('tut-spotlight');
    const tip = document.getElementById('tut-tooltip');
    if(idx < 0 || idx >= this._tutSteps.length){ this._endTutorial(); return; }

    this._tutCurrent = idx;
    const step = this._tutSteps[idx];
    const total = this._tutSteps.length;

    // Show overlay
    overlay.style.display = 'block';
    overlay.onclick = ()=>{}; // block clicks

    // Spotlight
    if(step.selector){
      const el = document.querySelector(step.selector);
      if(el){
        const r = el.getBoundingClientRect();
        const pad = 6;
        spot.style.display = 'block';
        spot.style.left = (r.left - pad) + 'px';
        spot.style.top = (r.top - pad) + 'px';
        spot.style.width = (r.width + pad*2) + 'px';
        spot.style.height = (r.height + pad*2) + 'px';
      } else { spot.style.display = 'none'; }
    } else {
      spot.style.display = 'none';
    }

    // Build tooltip
    const isFirst = idx === 0;
    const isLast = idx === total - 1;
    tip.innerHTML = `
      <div class="tut-tooltip-title">${step.title}</div>
      <div class="tut-tooltip-desc">${step.desc}</div>
      <div class="tut-tooltip-footer">
        <span class="tut-tooltip-steps">${idx+1} / ${total}</span>
        <div class="tut-tooltip-btns">
          ${isLast ? '' : '<button class="tut-btn tut-btn-skip" onclick="app._endTutorial()">Omitir</button>'}
          ${isFirst ? '' : '<button class="tut-btn tut-btn-prev" onclick="app._showTutStep(app._tutCurrent-1)">Anterior</button>'}
          <button class="tut-btn tut-btn-next" onclick="app._showTutStep(app._tutCurrent+1)">${isLast ? 'Empezar' : 'Siguiente'}</button>
        </div>
      </div>`;
    tip.style.display = 'block';

    // Position tooltip
    this._positionTutTooltip(step, tip);
  }

  _positionTutTooltip(step, tip){
    // Reset for measurement
    tip.style.left = '0px'; tip.style.top = '0px';
    const tw = tip.offsetWidth;
    const th = tip.offsetHeight;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    if(step.pos === 'center' || !step.selector){
      tip.style.left = Math.round((vw - tw)/2) + 'px';
      tip.style.top = Math.round((vh - th)/2) + 'px';
      return;
    }

    const el = document.querySelector(step.selector);
    if(!el){ tip.style.left = Math.round((vw-tw)/2)+'px'; tip.style.top = Math.round((vh-th)/2)+'px'; return; }
    const r = el.getBoundingClientRect();
    const gap = 14;
    let left, top;

    if(step.pos === 'right'){
      left = r.right + gap;
      top = r.top + r.height/2 - th/2;
    } else if(step.pos === 'top'){
      left = r.left + r.width/2 - tw/2;
      top = r.top - th - gap;
    } else if(step.pos === 'bottom'){
      left = r.left + r.width/2 - tw/2;
      top = r.bottom + gap;
    } else if(step.pos === 'left'){
      left = r.left - tw - gap;
      top = r.top + r.height/2 - th/2;
    }

    // Clamp inside viewport
    left = Math.max(8, Math.min(left, vw - tw - 8));
    top = Math.max(8, Math.min(top, vh - th - 8));
    tip.style.left = Math.round(left) + 'px';
    tip.style.top = Math.round(top) + 'px';
  }

  _endTutorial(){
    document.getElementById('tut-overlay').style.display = 'none';
    document.getElementById('tut-spotlight').style.display = 'none';
    document.getElementById('tut-tooltip').style.display = 'none';
    this._tutCurrent = -1;
    localStorage.setItem('pb_tutorialDone', '1');
  }

  _checkFirstVisitTutorial(){
    if(!localStorage.getItem('pb_tutorialDone')){
      setTimeout(()=> this.startTutorial(), 600);
    }
  }

}
